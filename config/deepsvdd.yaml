# Deep SVDD training / extraction config
# Reference: BMAD/Deep-SVDD/

model:
  name: deepsvdd
  pretrain: True          # ae pretraining
  objective: one-class      # one-class | soft-boundary
  nu: 0.1                   # soft-boundary hyperparameter (only used if objective=soft-boundary)
  optimizer_name: adam
  ae_optimizer_name: adam

train:
  n_epochs: 300 
  batch_size: 200
  lr: 0.0001
  weight_decay: 0.5e-7
  lr_milestones: 50        # epochs at which to drop LR by 0.1
  ae_lr: 0.00001
  ae_n_epochs: 150
  ae_lr_milestone: 250
  ae_batch_size: 200
  ae_weight_decay: 0.5e-6
  gpu: 0                    # GPU index; -1 for CPU
  seed: 42
  data_root: ./datasets/synth23_pelvis_v7_nifti
  output_root: ./results/deepsvdd
  name: ~                   # required: experiment name


  # checkpoint path is supplied via --checkpoint on the CLI
